resources:
  jobs:
    Global_Energy:
      name: Global Energy
      email_notifications:
        on_failure:
          - lleandrogon2004@gmail.com
      schedule:
        quartz_cron_expression: 16 30 21 * * ?
        timezone_id: America/Sao_Paulo
        pause_status: UNPAUSED
      tasks:
        - task_key: Bronze
          notebook_task:
            notebook_path: /Workspace/global energy/bronze/renewable_energy
            source: WORKSPACE
        - task_key: Silver
          depends_on:
            - task_key: Bronze
          notebook_task:
            notebook_path: /Workspace/global energy/silver/renewable_energy
            source: WORKSPACE
        - task_key: Gold
          depends_on:
            - task_key: Silver
          notebook_task:
            notebook_path: /Workspace/global energy/gold/Star Schema - Energy Transition
              Gold Layer
            source: WORKSPACE
      queue:
        enabled: true
      performance_target: PERFORMANCE_OPTIMIZED
